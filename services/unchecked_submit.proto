option java_package = "com.hederahashgraph.api.proto.java";
// <<<pbj.java_package = "com.hedera.hapi.node.transaction">>> This comment is special code for setting PBJ Compiler java package
option java_multiple_files = true;

/**
 * Submit an arbitrary (serialized) Transaction to the network without prechecks.
 *
 * This transaction SHALL require `superuser` privileges
 * (e.g. the `treasury` or `systemAdmin` accounts).
 */
message UncheckedSubmitBody {
    /**
     * The serialized bytes of a `Transaction`.<br/>
     * This transaction SHALL be deserialized and submitted for consensus with no further
     * validation.<br/>
     * Specifically, the transaction may violate basic limits and constraints such as
     * size limits, minimum or maximum values, valid start time, fee calculations, etc...
     */
    bytes transactionBytes = 1;
}
