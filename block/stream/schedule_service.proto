option java_package = "com.hedera.hapi.block.stream";
// <<<pbj.java_package = "com.hedera.hapi.block.stream">>> This comment is special code for setting PBJ Compiler java package
option java_multiple_files = true;

import "basic_types.proto";

/**
 * Block Stream data for a `createSchedule` transaction.
 *
 * This message SHALL NOT duplicate information already contained in the original transaction.
 */
message CreateScheduleOutput {
  /**
   * The id of the newly created Scheduled Entity.
   */
  ScheduleID schedule_id = 1;

  /**
   * The TransactionID that should be used to query for the receipt or
   * record of the relevant scheduled transaction when the status of the
   * transaction resolves to SUCCESS.
   */
  TransactionID scheduled_transaction_id = 2;

  /**
   * Reference to the scheduled transaction ID that this transaction record
   * represent.
   */
  ScheduleID schedule_ref = 3;
}

/**
 * Block Stream data for a `deleteSchedule` transaction.
 *
 * This message SHALL NOT duplicate information already contained in the original transaction.
 */
//message DeleteScheduleOutput {}

/**
 * Block Stream data for a `signSchedule` transaction.
 *
 * This message SHALL NOT duplicate information already contained in the original transaction.
 */
message SignScheduleOutput {
  /**
   * The TransactionID that should be used to query for the receipt or
   * record of the relevant scheduled transaction when the status of the
   * transaction resolves to SUCCESS.
   */
  TransactionID scheduled_transaction_id = 1;

  /**
   * Reference to the scheduled transaction ID that this transaction record
   * represent.
   */
  ScheduleID schedule_ref = 2;
}
