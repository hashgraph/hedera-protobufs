option java_package = "com.hedera.hapi.block.stream";
// <<<pbj.java_package = "com.hedera.hapi.block.stream">>> This comment is special code for setting PBJ Compiler java package
option java_multiple_files = true;

//import "basic_types.proto";
import "stream/block_item.proto";
//import "stream/block_header.proto";
//import "stream/block_state_proof.proto";

/**
 * Block is used to serialize all the data for a block into a stream of
 * blocks. This structure represents a block on an Hedera block chain.
 */
message Block {
  /**
   * A list of items that, together, make up this block.
   */
  repeated BlockItem items = 1;
}
